<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSP de la SPA (corte ZAP). Local: daemon en 127.0.0.1:7431. Relay C-2:
         relay en 127.0.0.1:8443. Producción remota: el daemon en Railway se
         alcanza por REST vía el proxy BFF ('self'), pero el WebSocket de eventos
         va DIRECTO (wss://…railway.app) porque el BFF no proxya WS → debe estar
         en connect-src. Google Sign-In (GIS) es el único script externo. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://accounts.google.com/gsi/client; connect-src 'self' https://api-production-bb02.up.railway.app wss://api-production-bb02.up.railway.app http://127.0.0.1:7431 ws://127.0.0.1:7431 http://127.0.0.1:8443 ws://127.0.0.1:8443 https://accounts.google.com; frame-src 'self' blob: https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'"
    />
    <meta name="color-scheme" content="light dark" />
    <title>Rutsubo — Sesiones</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
